<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FraudShield</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 24px 40px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 24px; font-weight: 700; color: #f1f5f9; }
        .header span { background: #ef4444; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        .upload-card { background: #1e293b; border: 2px dashed #334155; border-radius: 16px; padding: 48px; text-align: center; margin-bottom: 32px; transition: all 0.3s; cursor: pointer; }
        .upload-card:hover { border-color: #6366f1; background: #1e2d40; }
        .upload-card h2 { font-size: 20px; margin-bottom: 8px; color: #f1f5f9; }
        .upload-card p { color: #94a3b8; margin-bottom: 24px; }
        
        input[type="file"] { display: none; }
        .upload-btn { background: #6366f1; color: white; padding: 12px 32px; border-radius: 8px; border: none; font-size: 16px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        .upload-btn:hover { background: #4f46e5; }
        .analyze-btn { background: #10b981; color: white; padding: 14px 48px; border-radius: 8px; border: none; font-size: 18px; cursor: pointer; font-weight: 700; margin-top: 16px; width: 100%; transition: background 0.2s; }
        .analyze-btn:hover { background: #059669; }
        .analyze-btn:disabled { background: #334155; cursor: not-allowed; }
        
        .file-name { margin-top: 12px; color: #10b981; font-size: 14px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: #1e293b; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #334155; }
        .stat-card .number { font-size: 36px; font-weight: 800; margin-bottom: 4px; }
        .stat-card .label { color: #94a3b8; font-size: 14px; }
        .stat-card.fraud .number { color: #ef4444; }
        .stat-card.legit .number { color: #10b981; }
        .stat-card.total .number { color: #6366f1; }
        .stat-card.rate .number { color: #f59e0b; }
        
        .results-card { background: #1e293b; border-radius: 16px; padding: 24px; border: 1px solid #334155; }
        .results-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #f1f5f9; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #0f172a; padding: 12px 16px; text-align: left; font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 14px 16px; border-bottom: 1px solid #1e293b; font-size: 14px; }
        tr:hover td { background: #0f172a; }
        
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .badge.fraud { background: #450a0a; color: #ef4444; }
        .badge.legit { background: #052e16; color: #10b981; }
        .badge.high { background: #450a0a; color: #ef4444; }
        .badge.medium { background: #451a03; color: #f59e0b; }
        .badge.low { background: #052e16; color: #10b981; }
        
        .prob-bar { width: 100%; background: #0f172a; border-radius: 4px; height: 6px; margin-top: 4px; }
        .prob-fill { height: 6px; border-radius: 4px; }
        
        .hidden { display: none; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        
        .download-btn { background: #1e293b; color: #6366f1; border: 1px solid #6366f1; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; float: right; margin-bottom: 16px; }
        .download-btn:hover { background: #6366f1; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ FraudShield</h1>
        <span>LIVE</span>
    </div>

    <div class="container">
        <div class="upload-card" onclick="document.getElementById('fileInput').click()">
            <h2>Upload Transaction Data</h2>
            <p>Upload a CSV file to scan all transactions for fraud</p>
            <input type="file" id="fileInput" accept=".csv" onchange="handleFileSelect(event)">
            <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">📂 Choose CSV File</button>
            <div class="file-name" id="fileName"></div>
        </div>
        <button class="analyze-btn" id="analyzeBtn" disabled onclick="analyzeFile()">🔍 Analyze Transactions</button>

        <div id="loading" class="loading hidden">⏳ Analyzing transactions...</div>

        <div id="results" class="hidden">
            <div class="stats-grid">
                <div class="stat-card total"><div class="number" id="totalCount">0</div><div class="label">Total Transactions</div></div>
                <div class="stat-card fraud"><div class="number" id="fraudCount">0</div><div class="label">Fraud Detected</div></div>
                <div class="stat-card legit"><div class="number" id="legitCount">0</div><div class="label">Legit Transactions</div></div>
                <div class="stat-card rate"><div class="number" id="fraudRate">0%</div><div class="label">Fraud Rate</div></div>
            </div>

            <div class="results-card">
                <button class="download-btn" onclick="downloadResults()">⬇️ Download Results</button>
                <h3>Transaction Analysis Results</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Transaction ID</th>
                            <th>Prediction</th>
                            <th>Risk Level</th>
                            <th>Fraud Probability</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let allResults = [];

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                document.getElementById('fileName').textContent = '✅ ' + selectedFile.name;
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        async function analyzeFile() {
            if (!selectedFile) return;
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
            document.getElementById('analyzeBtn').disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('http://127.0.0.1:8000/batch-predict', { method: 'POST', body: formData });
                const data = await response.json();
                allResults = data.results;
                displayResults(data);
            } catch (error) {
                alert('Error connecting to API. Make sure the backend is running!');
            }

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('analyzeBtn').disabled = false;
        }

        function displayResults(data) {
            document.getElementById('totalCount').textContent = data.total_transactions;
            document.getElementById('fraudCount').textContent = data.fraud_detected;
            document.getElementById('legitCount').textContent = data.legit_transactions;
            document.getElementById('fraudRate').textContent = data.fraud_rate + '%';

            const tbody = document.getElementById('resultsTable');
            tbody.innerHTML = '';
            data.results.forEach(r => {
                const pct = Math.round(r.fraud_probability * 100);
                const color = r.prediction === 'FRAUD' ? '#ef4444' : '#10b981';
                tbody.innerHTML += `
                    <tr>
                        <td>#${r.transaction_id}</td>
                        <td><span class="badge ${r.prediction.toLowerCase()}">${r.prediction}</span></td>
                        <td><span class="badge ${r.risk_level.toLowerCase()}">${r.risk_level}</span></td>
                        <td>
                            ${pct}%
                            <div class="prob-bar"><div class="prob-fill" style="width:${pct}%;background:${color}"></div></div>
                        </td>
                    </tr>`;
            });
            document.getElementById('results').classList.remove('hidden');
        }

        function downloadResults() {
            const csv = ['Transaction ID,Prediction,Risk Level,Fraud Probability'];
            allResults.forEach(r => csv.push(`${r.transaction_id},${r.prediction},${r.risk_level},${r.fraud_probability}`));
            const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = 'fraud_results.csv'; a.click();
        }
    </script>
</body>
</html>
